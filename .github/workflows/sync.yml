name: Sync with Upstream Template

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository != 'EthanThatOneKid/zowiki' # Do not run on the template repo itself
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync with Template
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/EthanThatOneKid/zowiki.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -m "chore: sync with upstream template" || echo "Conflicts detected, please resolve manually."
          git push origin main
